<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    <title>Document</title>

<body style="background-color: rgba(95, 90, 90, 0.91);">
    <form>
        <p class="h1">Formulario de Registro</p>
        <div class="container">
            <div class="row">
                <div class="col">
                    <label for="input_nombre" class="form-label">Nombre Usuario:</label>
                    <input class="form-control" type="text" name="nombre" id="input_nombre"
                        placeholder="Ingrese su nombre">
                </div>
                <div class="col">
                    <label for="input_correo" class="form-label">Correo Electrónico:</label>
                    <input class="form-control" type="email" name="nombre" id="input_correo"
                        placeholder="Ingrese su nombre">
                </div>
            </div>
            <br>
            <div class="row">
                <div class="col">
                    <label for="input_contrasena" class="form-label">Contraseña:</label>
                    <input type="password" class="form-control" name="input_contrasena" id="input_contrasena">
                </div>
                <div class="col">XD</div>
            </div>
            <div class="row">
                <div class="col">XD</div>
                <div class="col">XD</div>
            </div>
            <div class="row">
                <div class="col">XD</div>
                <div class="col">XD</div>
            </div>
            <div class="row">
                <div class="col"></div>
                <div class="col">
                    <button type="button" class="btn btn-secondary">Cancelar</button>
                    <button type="button" class="btn btn-primary">Aceptar</button>
                </div>
            </div>
        </div>
    </form>
</body>

</html>
